    <title>我的笔记 · 我的笔记我的笔记 · My Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ========================================
           CSS 自定义属性（暗色 + 撞色系统）
           ======================================== */
        :root {
            /* 背景层级 — 深黑底 */
            --bg-page: #000000;
            --bg-surface: #080808;
            --bg-surface-hover: #101010;
            --bg-glass: rgba(0, 0, 0, 0.85);
            --bg-glass-heavy: rgba(0, 0, 0, 0.92);
            --bg-code: #050508;
            --bg-highlight: rgba(255, 229, 102, 0.18);

            /* 文字层级 — 保持白色系不变 */
            --text-body: #e8e8ed;
            --text-heading: #ffffff;
            --text-secondary: #c8c8d4;
            --text-muted: #8888a0;
            --text-faint: #666680;
            --text-placeholder: #5a5a72;
            --text-accent: #ffffff;

            /* 强调色 — 柠檬黄 + 暖金撞色 */
            --accent: #FFE566;
            --accent-light: #FFED80;
            --accent-mid: #F0D84C;
            --accent-dark: #C8A818;
            --accent-warm: #FFB347;
            --accent-warm-light: #FFC773;
            --accent-rgb: 255, 229, 102;
            --accent-warm-rgb: 255, 179, 71;
            --accent-glow: rgba(var(--accent-rgb), 0.15);
            --deco-muted: rgba(255, 229, 102, 0.12);
            --deco-highlight-start: #FFE566;
            --poetry-first-color: #e8e8ed;

            /* 边框 */
            --border-light: #1e1e2a;
            --border-subtle: #16161f;
            --border-card: #1e1e2a;

            /* 阴影基色 */
            --shadow-rgb: 0, 0, 0;

            /* 毛玻璃 */
            --blur-glass: blur(16px) saturate(1.2);
            --blur-heavy: blur(24px) saturate(1.4);

            /* 装饰渐变 */
            --deco-gradient: linear-gradient(135deg, var(--accent), var(--accent-dark));
            --deco-bar: linear-gradient(90deg, var(--accent-warm), var(--accent), var(--accent-warm-light), var(--accent), var(--accent-warm));
        }

        /* ========================================
           基础重置
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========================================
           页面基调
           ======================================== */
        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-page);
            color: var(--text-body);
            min-height: 100vh;
            line-height: 1.8;
        }

        /* 顶部装饰条 — 纯黑背景下移除 */
        /* body::before { ... } 已删除 */

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px 80px;
            opacity: 0;
        }

        /* ---- 滚动揭示 ---- */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .reveal.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        /* 鼠标跟随光晕 */
        .cursor-glow {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(91,140,184,0.06) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }


        /* ========================================
           页头
           ======================================== */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header.home-header {
            padding: 60px 0 40px;
            border-bottom: 1px solid var(--border-light);
        }

        header .site-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-heading);
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        header .site-title a {
            color: var(--text-heading);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .site-logo {
            flex-shrink: 0;
            color: var(--text-accent);
            opacity: 0.85;
        }

        header .site-title a:hover {
            color: var(--text-accent);
        }

        header .page-subtitle {
            font-size: 1.05rem;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            margin-top: 6px;
        }

        header .header-decoration {
            display: inline-block;
            width: 50px;
            height: 1px;
            background: var(--accent);
            margin: 16px 0 4px;
        }

        header .tagline {
            font-size: 1.05rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        header .back-link {
            display: inline-block;
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--text-faint);
            text-decoration: none;
            letter-spacing: 0.03em;
            transition: color 0.2s;
        }

        header .back-link:hover {
            color: var(--text-heading);
        }

        /* ========================================
           首页卡片
           ======================================== */
        .section {
            margin-bottom: 64px;
        }

        .section-title {
            font-size: 1.15rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
            padding-bottom: 0;
            border-bottom: none;
            letter-spacing: 0.06em;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .section-title .icon {
            flex-shrink: 0;
            color: var(--accent);
            opacity: 0.9;
        }

        .card-list {
            list-style: none;
            display: grid;
            gap: 12px;
        }

        .card-list li a {
            display: block;
            padding: 18px 22px 18px 26px;
            background: rgba(255,255,255,0.03);
            border: none;
            border-left: 3px solid transparent;
            border-radius: 6px;
            text-decoration: none;
            color: var(--text-heading);
            font-size: 1.02rem;
            transition: all 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
            letter-spacing: 0.03em;
            position: relative;
        }

        /* 撞色左边条 — 蓝橙交替 */
        .card-list li:nth-child(odd) a  { border-left-color: var(--accent); }
        .card-list li:nth-child(even) a { border-left-color: var(--accent-warm); }

        .card-list li a:hover {
            background: rgba(255,255,255,0.05);
            box-shadow: 0 6px 24px rgba(var(--accent-rgb), 0.18);
            transform: translateX(4px);
            border-left-width: 4px;
        }

        .card-list li a .desc {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 0.02em;
        }

        /* ========================================
           Bento 网格（首页）
           ======================================== */
        .home-grid {
            display: grid;
            grid-template-columns: 3fr 2fr;
            gap: 20px;
            max-width: 820px;
            margin: 0 auto;
        }

        .bento-card {
            background: rgba(255,255,255,0.025);
            border: 1px solid var(--border-card);
            border-radius: 20px;
            padding: 28px;
            transition: opacity 0.7s cubic-bezier(0.22, 0.61, 0.36, 1),
                        transform 0.7s cubic-bezier(0.22, 0.61, 0.36, 1),
                        border-color 0.3s ease,
                        box-shadow 0.3s ease;
            margin-bottom: 0;
        }

        /* 首页 Bento 开场：从下方淡入 */
        .bento-card.reveal {
            opacity: 0;
            transform: translateY(30px);
        }
        .bento-card.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        .bento-card:hover {
            border-color: rgba(255,255,255,0.08);
            box-shadow: 0 8px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04) inset;
        }

        .bento-card .section-title {
            margin-bottom: 18px;
        }

        /* Grid 位置 */
        .bento-left  { grid-column: 1; grid-row: 1; }
        .bento-right { grid-column: 2; grid-row: 1; }
        .bento-wide  { grid-column: 1 / -1; }
        .bento-full  { grid-column: 1 / -1; }

        /* 全宽横幅：随笔 — 低矮、单行引导 */
        .bento-wide .card-list {
            grid-template-columns: 1fr;
        }
        .bento-wide .card-list li a {
            padding: 14px 28px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 大区：诗集 — 3 卡横排 */
        .bento-full .card-list {
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }

        /* 左宽列：史学笔记 — 更充裕的呼吸空间 */
        .bento-left .card-list li a {
            padding: 22px 28px;
        }

        /* 右窄列：文哲笔记 — 两卡上下排列 */
        .bento-right .card-list {
            grid-template-columns: 1fr;
        }

        /* 响应式：窄屏回退单列 */
        @media (max-width: 640px) {
            .home-grid {
                grid-template-columns: 1fr;
                gap: 16px;
                max-width: 100%;
            }
            .bento-left,
            .bento-right,
            .bento-wide,
            .bento-full {
                grid-column: 1;
            }
            .bento-full .card-list {
                grid-template-columns: 1fr;
            }
            .bento-card {
                padding: 20px;
            }
        }

        /* ========================================
           正文排版（笔记 / 诗歌页面）
           ======================================== */
        .content {
            font-size: 1.1rem;
        }

        .content h1 {
            font-size: 2.2rem;
            margin-bottom: 0.6em;
            margin-top: 0.4em;
            letter-spacing: 0.05em;
            font-weight: 700;
            line-height: 1.4;
            text-align: center;
            background: linear-gradient(135deg, #ffffff, #FFED80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 诗歌页 h1 强化 */
        .content.poetry h1 {
            font-size: 2.6rem;
            letter-spacing: 0.1em;
            margin-bottom: 1.2em;
            position: relative;
        }
        .content.poetry h1::after {
            content: '';
            display: block;
            width: 50px;
            height: 2px;
            background: var(--accent);
            margin: 18px auto 0;
            border-radius: 1px;
        }

        .content h2 {
            font-size: 1.5rem;
            color: var(--text-heading);
            margin: 1.8em 0 0.6em;
            padding-bottom: 0.4em;
            border-bottom: 1px solid var(--border-light);
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .content h3 {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin: 1.4em 0 0.5em;
            letter-spacing: 0.03em;
            font-weight: 600;
        }

        .content p {
            margin-bottom: 1.2em;
            text-indent: 0;
            line-height: 2.1;
        }

        .content strong {
            color: var(--text-accent);
            font-weight: 700;
        }

        .content blockquote {
            margin: 1.5em 0;
            padding: 16px 22px;
            border-left: 4px solid var(--accent);
            background: var(--bg-surface);
            color: var(--text-secondary);
            font-style: italic;
            letter-spacing: 0.03em;
            border-radius: 0 6px 6px 0;
            box-shadow: 0 2px 8px rgba(var(--shadow-rgb), 0.06);
        }

        .content blockquote:first-child {
            /* 版权声明块的样式——更轻盈 */
            border-left-color: var(--deco-muted);
            background: transparent;
            font-style: normal;
            font-size: 0.9rem;
            color: var(--text-faint);
            margin-bottom: 2em;
        }

        /* 正文引用块——装饰性开引号 */
        .content blockquote:not(:first-child) {
            position: relative;
        }
        .content blockquote:not(:first-child)::before {
            content: '"';
            display: block;
            font-size: 2.8rem;
            color: var(--accent);
            line-height: 0.6;
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            margin-bottom: 6px;
            opacity: 0.5;
        }

        .content ul,
        .content ol {
            margin: 0.8em 0 1.2em;
            padding-left: 1.8em;
        }

        .content li {
            margin-bottom: 0.4em;
        }

        .content hr {
            margin: 2em 0;
            border: none;
            text-align: center;
            overflow: visible;
        }
        .content hr::after {
            content: '·  ·  ·';
            color: var(--deco-muted);
            font-size: 1.2rem;
            letter-spacing: 0.3em;
        }

        /* 诗歌分隔符 */
        .content.poetry hr::after {
            content: '❧';
            font-size: 1.3rem;
            color: var(--accent);
            letter-spacing: normal;
            animation: fleuron-breathe 4s ease-in-out infinite;
        }

        @keyframes fleuron-breathe {
            0%, 100% { opacity: 0.45; }
            50%      { opacity: 0.85; }
        }

        .content a {
            color: var(--text-accent);
            text-decoration: none;
            background: linear-gradient(currentColor, currentColor) left bottom / 0 1px no-repeat;
            transition: background-size 0.35s ease, color 0.25s;
            padding-bottom: 1px;
        }

        .content a:hover {
            color: var(--text-heading);
            background-size: 100% 1px;
        }

        .content code {
            font-family: "Inter", "SF Mono", "Fira Code", monospace;
            background: var(--bg-code);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.9em;
            color: var(--text-heading);
        }

        .content pre {
            background: var(--bg-code);
            padding: 16px 20px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 1.2em 0;
        }

        .content pre code {
            background: none;
            padding: 0;
        }

        /* 诗歌专属：寒蝉活宋体（Shippori Mincho）+ 宽松排版 */
        .content.poetry {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .content.poetry p {
            line-height: 2.4;
            letter-spacing: 0.06em;
        }

        /* 诗歌组：每首诗作为独立"卡片" */
        .content.poetry .reveal-group {
            padding-top: 2em;
            margin-bottom: 2.5em;
            border-top: 1px solid var(--bg-code);
        }
        .content.poetry .reveal-group:first-of-type {
            border-top: none;
            padding-top: 0;
        }
        .content.poetry .reveal-group > p:last-child {
            margin-bottom: 0;
            padding-bottom: 1em;
            position: relative;
        }
        .content.poetry .reveal-group > p:last-child::after {
            content: '';
            display: block;
            margin-top: 1.5em;
        }

        .content.poetry h2 {
            color: var(--text-heading);
            font-size: 1.6rem;
            letter-spacing: 0.08em;
            border-bottom: none;
            padding-bottom: 0;
            padding-left: 20px;
            border-left: 5px solid var(--accent);
            margin-top: 3.5em;
        }

        /* 每首诗首行放大 */
        .reveal-group > p:first-of-type {
            font-size: 1.15rem;
            color: var(--text-body);
        }

        .content.poetry .reveal-group > p:first-of-type {
            font-size: 1.22rem;
            color: var(--poetry-first-color);
        }

        /*
         * 如有寒蝉活宋体本地文件，替换上方 Shippori Mincho：
         *
         * @font-face {
         *     font-family: 'ChillHuoSong';
         *     src: url('/my-notes/assets/fonts/ChillHuoSong_F.woff2') format('woff2');
         *     font-display: swap;
         * }
         * .content.poetry { font-family: "ChillHuoSong", ...; }
         */

        /* ========================================
           复古质感（活字印刷凹凸 + 纸张晕染）
           ======================================== */
        /* 纯黑背景 — 无纸张晕染 */
        .content {
            /* radial-gradient 已移除 */
        }

        /* 纯黑背景 — 无活字凹凸 */
        .content p {
            /* text-shadow 已移除 */
        }

        /* 诗歌页：纯黑背景 — 无晕染凹凸 */
        .content.poetry {
            /* radial-gradient 已移除 */
        }
        .content.poetry p {
            /* text-shadow 已移除 */
        }

        /* ========================================
           页脚
           ======================================== */
        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border-light);
            font-size: 0.85rem;
            color: var(--text-faint);
            letter-spacing: 0.04em;
            position: relative;
        }
        footer::before {
            content: '';
            position: absolute;
            top: -1px;
            left: calc(-50vw + 50%);
            right: calc(-50vw + 50%);
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--deco-muted) 20%, var(--deco-muted) 80%, transparent);
        }

        footer .copyright-line {
            font-size: 0.75rem;
            color: var(--text-faint);
            margin-bottom: 4px;
        }

        footer .license-line {
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        footer .license-line a {
            color: var(--text-muted);
        }

        footer .repo-line {
            font-size: 0.78rem;
        }

        footer a {
            color: var(--text-muted);
            text-decoration: none;
        }

        footer a:hover {
            color: var(--text-heading);
            text-decoration: underline;
        }

        /* ========================================
           滚动条
           ======================================== */
        ::-webkit-scrollbar { width: 7px; }
        ::-webkit-scrollbar-track { background: var(--bg-page); }
        ::-webkit-scrollbar-thumb { background: var(--deco-muted); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* ========================================
           响应式
           ======================================== */
        @media (max-width: 600px) {
            .container {
                padding: 30px 16px 60px;
            }
            header {
                padding: 40px 0 30px;
            }
            header .site-title {
                font-size: 1.3rem;
            }
            .card-list li a {
                padding: 14px 16px;
            }
            .content h1 {
                font-size: 1.6rem;
            }
            .content h2 {
                font-size: 1.25rem;
            }
            .content {
                font-size: 1rem;
            }
            .content.poetry .reveal-group {
                padding-top: 1.4em;
                margin-bottom: 1.8em;
            }
            .section {
                margin-bottom: 44px;
            }
            .toc-card {
                padding: 16px 18px;
            }
            .poem-nav {
                gap: 8px 14px;
            }
            .back-to-top {
                right: 12px;
                bottom: 16px;
                width: 36px;
                height: 36px;
            }
            .back-nav {
                left: 10px;
                top: 14px;
                height: 30px;
                font-size: 0.78rem;
                padding: 0 12px;
            }
            .back-to-top {
                right: 10px;
                bottom: 16px;
                height: 30px;
                font-size: 0.78rem;
                padding: 0 12px;
            }
            .music-player {
                top: 10px;
                right: 10px;
                height: 30px;
                width: 30px;
            }
            .music-icon {
                width: 16px;
                height: 16px;
            }
            .tool-btn {
                width: 38px; height: 38px;
                border-radius: 10px;
            }
            .toolbar { top: 28px; gap: 22px; }
        }

        /* ========================================
           阅读进度条
           ======================================== */
        .progress-bar {
            position: fixed;
            top: 4px;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--text-accent));
            z-index: 100;
            width: 0%;
            transition: width 0.1s linear;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.5) 40%, rgba(255,255,255,0.5) 60%, transparent 100%);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
            100% { transform: translateX(100%); }
        }

        /* ========================================
           工具栏（三图标，鼠标靠近顶部从上方滑下）
           ======================================== */
        .toolbar {
            position: fixed;
            top: 38px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            z-index: 90;
            display: flex;
            gap: 28px;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1),
                        opacity 0.35s ease-out;
        }
        .toolbar.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        /* Apple 毛玻璃图标 — 近乎融于背景，仅靠内高光/描边呈现玻璃厚度 */
        .tool-btn {
            width: 44px; height: 44px;
            border-radius: 12px;

            transition: opacity 0.3s ease;

            opacity: 1; pointer-events: auto;

            opacity: 1;

        .spotlight-bar {

        .cards-overlay.active {

        }
        .cards-stage {

        }
        .cards-hint {
            position: absolute;
            bottom: 36px; left: 50%;
            transform: translateX(-50%);

        /* 卡片单体 */
        .card-item {
            position: absolute;
            left: 50%; top: 50%;

        .card-inner {
            width: 100%; height: 100%;
            transform-style: preserve-3d;

        .card-face {
            position: absolute; inset: 0;
            backface-visibility: hidden;

        // ========================================

        // ========================================
        var progressBar = document.getElementById('progress-bar');
        function updateProgress() {
            var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            var docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            if (docHeight > 0) {
                var pct = Math.min(100, Math.round((scrollTop / docHeight) * 100));
                progressBar.style.width = pct + '%';
            }
        }
        window.addEventListener('scroll', updateProgress, { passive: true });
        updateProgress();

        // ========================================
        // 2.3 返回顶部按钮
        // ========================================
        var backBtn = document.getElementById('back-to-top');
        function toggleBackBtn() {
            var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > 400) {
                backBtn.classList.add('visible');
            } else {
                backBtn.classList.remove('visible');
            }
        }
        window.addEventListener('scroll', toggleBackBtn, { passive: true });
        backBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });

        // ========================================

        // ========================================
        // 4.1 滚动揭示
        // ========================================
        (function initReveal() {
            var mainEl2 = document.querySelector('main.content');
            if (!mainEl2) return;

            // 首页：卡片分区依次揭示
            var sections = document.querySelectorAll('.section');
            if (sections.length > 0) {
                sections.forEach(function(sec, i) {
                    sec.classList.add('reveal');
                    sec.style.transitionDelay = (i * 0.1) + 's';
                });
            }

            // 内容页：把每个 h2 + 后续内容分成一组
            var groups = [];
            var currentGroup = [];
            var children = mainEl2.children;
            for (var i = 0; i < children.length; i++) {
                var el = children[i];
                if (el.tagName === 'H2') {
                    if (currentGroup.length > 0) groups.push(currentGroup);
                    currentGroup = [el];
                } else {
                    currentGroup.push(el);
                }
            }
            if (currentGroup.length > 0) groups.push(currentGroup);

            // 为每组创建包裹元素，级联延迟
            groups.forEach(function(group, gi) {
                if (group.length === 0) return;
                var wrapper = document.createElement('div');
                wrapper.className = 'reveal reveal-group';
                wrapper.style.transitionDelay = (gi * 0.06) + 's';
                group[0].parentNode.insertBefore(wrapper, group[0]);
                group.forEach(function(el) { wrapper.appendChild(el); });
            });

            // Intersection Observer
            if ('IntersectionObserver' in window) {
                var observer = new IntersectionObserver(function(entries) {
                    entries.forEach(function(entry) {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('revealed');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });

                document.querySelectorAll('.reveal').forEach(function(el) {
                    observer.observe(el);
                });
            } else {
                // 降级：直接显示
                document.querySelectorAll('.reveal').forEach(function(el) {
                    el.classList.add('revealed');
                });
            }

        // 4.2 超大径向渐变开场动画 — 纯黑基底 + 3层柔焦渐变 + 细颗粒噪点
        // ========================================
        (function initKeystroke() {
            var overlay = document.getElementById('keystroke-overlay');
            if (!overlay) {
                var c = document.querySelector('.container');
                if (c) c.classList.add('entrance-start');
                return;
            }
            var container = document.querySelector('.container');
            var revealed = false;
            var safetyTimer = null;

            function revealPage() {
                if (revealed) return;
                revealed = true;
                clearTimeout(safetyTimer);
                overlay.classList.add('fade-out');
                if (container) container.classList.add('entrance-start');
                setTimeout(function() { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 600);
            }

            try {
                function startAnimation() {
                    // ==========================================
                    // 1. Canvas 初始化
                    // ==========================================
                    var canvas = document.createElement('canvas');
                    canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;display:block;';
                    overlay.appendChild(canvas);
                    var ctx = canvas.getContext('2d');

                    var W = window.innerWidth;
                    var H = window.innerHeight;
                    var dpr = Math.min(window.devicePixelRatio || 1, 2);

                    // ==========================================
                    // 2. resize：DPR 适配 + 重新生成噪点
                    // ==========================================
                    function resize() {
                        dpr = Math.min(window.devicePixelRatio || 1, 2);
                        W = window.innerWidth;
                        H = window.innerHeight;

                        canvas.height = Math.floor(H * dpr);
                        canvas.style.width  = W + 'px';
                        canvas.style.height = H + 'px';
                        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                        generateGrain();

                    // 3. 超大柔焦径向渐变（≥900px 半径，7 阶平滑衰减）
                    // ==========================================
                    function drawGiantRadial(x, y, radius, r, g, b, alpha) {
                        var grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
                        grad.addColorStop(0,    'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')');
                        grad.addColorStop(0.1,  'rgba(' + r + ',' + g + ',' + b + ',' + (alpha * 0.9)  + ')');
                        grad.addColorStop(0.25, 'rgba(' + r + ',' + g + ',' + b + ',' + (alpha * 0.65) + ')');
                        grad.addColorStop(0.45, 'rgba(' + r + ',' + g + ',' + b + ',' + (alpha * 0.3)  + ')');
                        grad.addColorStop(0.65, 'rgba(' + r + ',' + g + ',' + b + ',' + (alpha * 0.1)  + ')');
                        grad.addColorStop(0.82, 'rgba(' + r + ',' + g + ',' + b + ',' + (alpha * 0.025) + ')');
                        grad.addColorStop(1,    'rgba(' + r + ',' + g + ',' + b + ',0)');
                        ctx.fillStyle = grad;
                        ctx.fillRect(0, 0, W, H);
                    }

                    // 4. 像素级单色细颗粒噪点（逻辑分辨率，仅 4% 透明度）
                    // ==========================================
                    var grainCanvas = null;
                    function generateGrain() {
                        var gw = Math.max(1, W);
                        var gh = Math.max(1, H);
                        grainCanvas = document.createElement('canvas');
                        grainCanvas.width  = gw;
                        grainCanvas.height = gh;
                        var gctx = grainCanvas.getContext('2d');
                        var img = gctx.createImageData(gw, gh);
                        var d = img.data;
                        for (var i = 0; i < d.length; i += 4) {
                            var v = Math.floor(Math.random() * 255);
                            d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 255;
                        }
                        gctx.putImageData(img, 0, 0);
                    }
                    resize();
                    window.addEventListener('resize', resize);

                    // ==========================================
                    // 5. 渐变层定义（3 层，仅橘橙 + 藏蓝）
                    // ==========================================
                    // 浓郁脏橘色 #e65a22
                    var OR = 230, OG = 90, OB = 34, OA = 0.48;
                    // 深邃藏蓝色 #1a3b80
                    var BR = 26, BG = 59, BB = 128, BA = 0.45;

                    // 模糊半径：不低于 900px（取视口长边 ×0.52，与 900 取较大值）
                    var BLUR = Math.max(Math.max(W, H) * 0.52, 900);

                    // 6. 渲染循环（极慢平移，不扭曲形状）
                    // ==========================================
                    var startTime = performance.now();
                    var animId = null;
                    var exiting = false;

                        animId = requestAnimationFrame(render);
                        var t = (ts - startTime) / 1000;

                        ctx.fillStyle = '#000000';
                        ctx.fillRect(0, 0, W, H);

                        // 各层中心极慢漂移（周期 90~150 秒，幅度 20~40px）
                        var oxL = W * 0.23 + Math.sin(t * 0.011) * 30;
                        var oyL = H * 0.45 + Math.cos(t * 0.008) * 22;

                        var oxR = W * 0.77 + Math.sin(t * 0.010 + 2.0) * 30;
                        var oyR = H * 0.45 + Math.cos(t * 0.007 + 2.0) * 22;

                        var bx  = W * 0.50 + Math.sin(t * 0.009 + 4.0) * 35;
                        var by  = H * 0.16 + Math.cos(t * 0.007 + 4.0) * 20;

                        // Layer 1: 左侧浓郁脏橘
                        drawGiantRadial(oxL, oyL, BLUR, OR, OG, OB, OA);
                        // Layer 2: 右侧浓郁脏橘（对称）
                        drawGiantRadial(oxR, oyR, BLUR, OR, OG, OB, OA);
                        // Layer 3: 顶部正中深邃藏蓝
                        drawGiantRadial(bx, by, BLUR, BR, BG, BB, BA);

                        // Layer 4: 像素级细颗粒噪点（4% 透明度，仅微质感）
                        if (grainCanvas) {
                            ctx.globalAlpha = 0.04;
                            ctx.drawImage(grainCanvas, 0, 0, W, H);
                            ctx.globalAlpha = 1.0;
                        }
                    }
                    requestAnimationFrame(render);

                    // ==========================================
                    // 7. 退场过渡
                    // ==========================================
                    function beginExit() {
                        if (exiting || revealed) return;
                        exiting = true;
                        clearTimeout(safetyTimer);
                        canvas.style.transition = 'opacity 0.5s ease-out';
                        canvas.style.opacity = '0';
                        setTimeout(function() {
                            cancelAnimationFrame(animId);
                            canvas.remove();
                            revealPage();
                        }, 500);
                    }

                    // ==========================================
                    // 8. 交互绑定
                    // ==========================================
                    safetyTimer = setTimeout(function() { beginExit(); }, 8000);
                    overlay.addEventListener('click', function() {
                        if (!exiting && !revealed) beginExit();
                    });
                }

            } catch(e) {
                setTimeout(function() { revealPage(); }, 2000);
            }
        })();

        (function initCursorGlow() {

      {"heading": "半截的夏风", "text": "于是风比苦痛先到 仿佛轮回一次又一次 谁能释然这简单的旋律 热泪总是要盈眶 瑟瑟的冷冽 然后遁入地铁口 多少的人群尔尔 我才觉得一件幸事不易 行走没有波折没有预期的步迹 记忆不体面地相形见绌 一程一程的相信 信鸽应忠诚走在没法靠近的城林 请搂紧我 我别去留意末尾的字迹 长河里游轮甲板吹吹 像海 我从没去过 想必慢慢很轻盈并肩月光里厮磨 大笑时一塌糊涂 你我都不知道 比所有时候都自然没有虚张声势 风也柔情 水也柔情 逢人就说 像在跟你对话 枯萎似乎很遥远 别醉在醺醺的物件里 打扰你的时间 原来回过神来 像山 从他人听到你 我总胆怯 一叠又一叠 整条街都弥漫着夜花香 我路过 鼓点在埋伏 算算让心跳和你一起来 一转头就 一个路口 模糊不清的杂音 我意识到句号的弃笔 从此徒劳想象你 一直只是同个季节 或稍晚些 只恐记住瞬间 就已疲惫 一双翡翠玉的双眼 贪恋至今 停停走走 呼吸不匀称时重时缓 其实你也怕迟迟 我猜 夏风席地而坐 从来短了半截 没春风缠绵 没冬风急促 我倒愿意在丘陵大哭一场 可是没有泪 克制别触摸 三杯下肚 云在哭泣 你在认真等末班车 去哪家酒吧调配一杯酒 味道和我们类似 你在酣睡 梦里回忆谁和谁的爱意 你在等或者直接追寻所爱 你比我大胆 像一片湖 我没去过 所以你像夏风 与我一样的夏风 你会追一部剧 我们曾看过 请怀念我 然后去找一段新的旋律 棕花鹿越过山丘 所以痛苦比风先消逝 我在泥沼之上等待我自己"},
      {"heading": "平原", "text": "冬雨结束的时候 或者犁了地的土壤 踩一下都像是拥抱 柔软慢吞吞 酥颤一般腿发抖 像个老人 平原是每个北方人的宇宙 枯桠侵占半边天 喝醉的天气时好时坏 晕蓝像葡萄酒 半杯不辣嗓子 萦绕身怀春风三度 呜咽的火噼啪吐出炭红 上方模糊的烟熏直令人着迷 红透的还有佝偻的瓦 整片山岗与土野 祭祖的赶忙多败这点火 勾诱着我去想 想着平原之外另一个平原 娃儿笑娃儿哭 想着镭青色的烟花 想着一锅炖菜一年一次 堆积已湿的柴欲冷还燎 比张牙舞爪还辽阔的话 在一桌凉菜的酒里粘着 不要去察言观色 凝滞的气氛 蛇打七寸 水塘里水土不服 淡淡的香烟味掩住老人的膻味 盘到滑溜的拐杖斜倚着墙 我想它一定提防着顽童作祟 老式电视歇了几年死树作伴 坟茔头的落木成群 盘算着一年的来来往往 吸口新鲜空气的由头没了 乖乖回去夜也识趣 不过再寒的星也抵不住52度的烈酒 正如再热的泪暖不了困陷的心 方寸是每个北方人的平原 自由的是平原 沦陷的也是平原"},
      {"heading": "我爱上一个斯柯达顿人", "text": "我爱上一个斯柯达顿人 等我走在一条歧路 我去到 一座空城 教堂在举办一场婚礼 溪流无声 长鸽橄榄 骑士跪与瞩目着细散的发尾 摇摇在日光 岩柱依靠海风的拍打 在斯柯达顿兵荒之前我远游 抛弃庄园里的私生女 遍野的亚麻 税收太杂 她结识将军 黑马披护身甲东征归来 而我卧在马车粮袋上投掷最后一枚金币 信笺用尽最后一根羽毛 俘虏潦倒的我 昨夜巍峨阿尔卑斯山的孤单 我弃暗投明追随吟游诗人漫步十年 百年战争一遭萦绕摩西的真言 何时归来等干热的风加冕 我爱上一个斯柯达顿人 她将西班牙葡萄酒留给白裙一袭 少时光晕 金鬓月桂 遥听牧羊女远去的歌谣 留下枯燥的石楠与地中海气候 将借来的十字架高高挂悬 不会因信称义 夹竹桃白沙的浅滩我拼命逃窜 我似乎看到了一盏东方的碎花釉彩瓷 在哪里的酒馆的鎏金铜饰的波纹柜台里 等我或是谁拿去"},

      {"heading": "花白天", "text": "你比小心翼翼的枯萎还要失落 醉和烟头的炽火 在某个泛白的夜里 你舞 舞到没有春天的日子里 写一首童谣吧 描摹雨 在地铁口失神 一朵云没有分寸 何必呢 死亡是隔夜的秋 山躲 躲着花白天的鸭绿与鹅黄 红晕散开 你会一语中伤 如同谁会回答的疑"},

        // 为每张卡生成随机初始属性（紧凑交叠，左底右顶，统一右倾 + 逐卡微调）
        function randomCardProps(i, d) {
            var centerI = (cardData.length - 1) / 2;
            var distFromCenter = Math.abs(i - centerI) / centerI;
            // 微拱 Y：中央更明显上浮 + 锯齿交替 + 逐卡微调
            var archY = (1 - distFromCenter) * 15 + (Math.random() - 0.5) * 10;
            var zigzag = (i % 2) * 7;
            // 统一右倾：从左到右渐增（收窄以减少透视变形）
            var baseRot;
            if (i === 0)      baseRot = 1.5;
            else if (i === 1) baseRot = 2.5;
            else if (i === 2) baseRot = 3;
            else if (i === 3) baseRot = 4.5;
            else              baseRot = 6;
            var fanRot = baseRot + (Math.random() - 0.5) * 4 + (d.adjRot || 0);
            return {

                homeY: -archY + zigzag + (d.adjY || 0),
                homeRot: fanRot,
                z: i,
                enterDelay: i * 200,
                enterDuration: 480 + Math.random() * 140
            };
        }

        // 弹簧状态

        // 弹簧更新
        function springUpdate(state, target, stiffness, damping) {
            var force = (target - state.pos) * stiffness;
            state.vel += force;
            state.vel *= damping;
            state.pos += state.vel;
        }

        // 渲染帧

        function cardLoop() {
            cardRaf = null;
            var anyActive = false;

            // 找离鼠标最近的卡片（仅此一张响应悬停）
            var hoveredIdx = -1;
            var minDist = Infinity;
            for (var hi = 0; hi < cardSprings.length; hi++) {
                var hs = cardSprings[hi];
                if (hs.entering || (hs.enterAt !== null && performance.now() < hs.enterAt)) continue;
                var hx = window.innerWidth/2 + hs.x.pos;
                var hy = window.innerHeight/2 + hs.y.pos;
                var hd = Math.sqrt((mouseCX-hx)*(mouseCX-hx) + (mouseCY-hy)*(mouseCY-hy));
                if (hd < minDist) { minDist = hd; hoveredIdx = hi; }
            }

            cardSprings.forEach(function(sp, i) {
                var el = cardEls[i];
                if (!el) return;

                // 入场冻结：未到入场时间的卡片保持不可见
                if (sp.enterAt !== null && performance.now() < sp.enterAt) {
                    anyActive = true;
                    el.style.opacity = '0';
                    return;
                }
                // 入场时刻到：启动 ease-out 缓动
                if (sp.enterAt !== null && !sp.entering) {
                    sp.entering = true;
                    sp.enterStartX = sp.x.pos;
                    sp.enterStartY = sp.y.pos;
                    sp.enterStartRot = sp.rot.pos;
                    sp.enterStartTime = performance.now();
                    sp.enterAt = null;
                }
                // 入场缓动中：ease-out cubic 滑入，不走弹簧
                if (sp.entering) {
                    var raw = Math.min(1, (performance.now() - sp.enterStartTime) / sp.enterDuration);
                    var t = 1 - Math.pow(1 - raw, 3);  // ease-out cubic
                    sp.y.pos = sp.enterStartY + (sp.homeY - sp.enterStartY) * t;
                    sp.x.pos = sp.enterStartX + (sp.homeX - sp.enterStartX) * t;
                    sp.rot.pos = sp.enterStartRot + (sp.homeRot - sp.enterStartRot) * t;
                    sp.scale.pos = 1;
                    sp.y.vel = 0; sp.x.vel = 0; sp.rot.vel = 0;
                    if (raw >= 1) {

                        sp.y.pos = sp.homeY; sp.x.pos = sp.homeX; sp.rot.pos = sp.homeRot;

                    anyActive = true;
                    el.style.opacity = '1';

                        'scale(' + sp.scale.pos.toFixed(3) + ')';

                var targetY = sp.homeY;
                var targetRot = sp.homeRot;
                var targetFlip = sp.flipped ? 180 : 0;
                var targetScale = sp.homeScale || 1;

                // 悬停磁吸：仅离鼠标最近的一张卡片响应
                if (draggedCard !== i && hoveredIdx === i && minDist < 180) {

                    var sy = window.innerHeight/2 + sp.y.pos;
                    var dx = mouseCX - sx;
                    var dy = mouseCY - sy;
                    var inf = 1 - Math.min(1, minDist/180);
                    targetX += dx * inf * 0.15;
                    targetY += dy * inf * 0.12 - inf * 6;
                    targetScale += inf * 0.10;
                    el.style.zIndex = cardData.length + 10;
                    el.style.filter = 'drop-shadow(0 8px 20px rgba(0,0,0,0.18))';
                } else if (draggedCard !== i) {
                    el.style.zIndex = sp.z;
                    el.style.filter = '';

                // 被拖拽的卡不弹簧更新
                if (draggedCard === i) {
                    // 拖拽中：只更新 flip 和 scale（轻微抬起放大）
                    springUpdate(sp.flip, targetFlip, FLIP_STIFFNESS, FLIP_DAMPING);

                    springUpdate(sp.y, targetY, STIFFNESS, DAMPING);
                    springUpdate(sp.rot, targetRot, STIFFNESS * 0.8, DAMPING);
                    springUpdate(sp.flip, targetFlip, FLIP_STIFFNESS, FLIP_DAMPING);
                    springUpdate(sp.scale, targetScale, 0.04, 0.78);

                sp.x.pos = Math.max(-window.innerWidth/2 + 115, Math.min(window.innerWidth/2 - 115, sp.x.pos));

                // 判断是否还在运动
                if (Math.abs(sp.x.vel) > 0.02 || Math.abs(sp.y.vel) > 0.02 ||

                    Math.abs(sp.scale.pos - 1) > 0.0005) {
                    anyActive = true;

                // 应用 transform
                el.style.transform =
                    'translate3d(' + sp.x.pos.toFixed(1) + 'px, ' + sp.y.pos.toFixed(1) + 'px, 0px) ' +
                    'rotate(' + sp.rot.pos.toFixed(2) + 'deg) ' +
                    'scale(' + sp.scale.pos.toFixed(3) + ')';

                if (inner) {
                    inner.style.transform = 'rotateY(' + sp.flip.pos.toFixed(1) + 'deg)';

            dragMoved = false;
            var sp = cardSprings[idx];
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            dragStartPosX = sp.x.pos;
            dragStartPosY = sp.y.pos;
            dragLastX = e.clientX;
            dragLastY = e.clientY;
            dragVelX = 0; dragVelY = 0;

            card.classList.add('dragging');
            card.style.zIndex = 999;
            e.preventDefault();
        });

        window.addEventListener('pointermove', function(e) {
            if (draggedCard === null) return;
            var sp = cardSprings[draggedCard];
            var dx = e.clientX - dragStartX;
            var dy = e.clientY - dragStartY;
            var totalMove = Math.abs(e.clientX - dragStartX) + Math.abs(e.clientY - dragStartY);
            if (totalMove > DRAG_THRESHOLD) dragMoved = true;

            // 计算速度（用于释放后的惯性）
            dragVelX = e.clientX - dragLastX;
            dragVelY = e.clientY - dragLastY;
            dragLastX = e.clientX;
            dragLastY = e.clientY;

            sp.x.pos = dragStartPosX + dx;
            sp.y.pos = dragStartPosY + dy;
            sp.x.vel = 0;
            sp.y.vel = 0;
        });

        window.addEventListener('pointerup', function(e) {
            if (draggedCard === null) return;
            var idx = draggedCard;
            var sp = cardSprings[idx];
            var el = cardEls[idx];

            el.classList.remove('dragging');
            el.style.zIndex = cardData.length;

            if (!dragMoved) {
                // 点击 → 翻转
                sp.flipped = !sp.flipped;
            } else {
                // 释放 → 惯性 + 弹簧回弹
                sp.x.vel = dragVelX * 0.6;
                sp.y.vel = dragVelY * 0.6;
                sp.x.pos = dragStartPosX + (e.clientX - dragStartX);
                sp.y.pos = dragStartPosY + (e.clientY - dragStartY);
            }

            draggedCard = null;
            if (!cardRaf) cardRaf = requestAnimationFrame(cardLoop);
        });

        // 卡片背面点击 → 打开链接
        cardsStage.addEventListener('click', function(e) {
            if (dragMoved) return;
            var card = e.target.closest('.card-item');
            if (!card || !cardsOpen) return;
            var idx = parseInt(card.getAttribute('data-index'));
            var sp = cardSprings[idx];
            if (sp && sp.flipped) {
                var url = card.getAttribute('data-url');
                if (url) window.location.href = url;
            }
        });

        // ========================================
        // 工具栏立体磁吸 — 大浮动 + 间距扩散 + 板式 3D 倾斜 + 放大
        // ========================================
        (function initMagneticTilt() {
            var btns = document.querySelectorAll('.tool-btn');
            if (!btns.length) return;

            var states = [];
            btns.forEach(function(btn, i) {
                states.push({
                    el: btn,
                    curTX: 0, curTY: 0,       // 3D tilt
                    curAX: 0, curAY: 0,       // 磁吸位移
                    curSpread: 0,              // 扩散位移
                    curScale: 1,
                    phase: Math.random() * Math.PI * 2
                });
            });

            var mx = -999, my = -999;
            var raf = null;

            document.addEventListener('mousemove', function(e) {
                mx = e.clientX;
                my = e.clientY;
                if (!raf) raf = requestAnimationFrame(loop);
            });

            function loop(ts) {
                raf = null;
                var tSec = ts / 1000;

                var tRect = toolbar.getBoundingClientRect();
                var tCX = tRect.left + tRect.width / 2;
                var tCY = tRect.top + tRect.height / 2;
                var distToTB = Math.hypot(mx - tCX, my - tCY);

                var allIdle = true;

                states.forEach(function(s, i) {
                    var rect = s.el.getBoundingClientRect();
                    var bx = rect.left + rect.width / 2;
                    var by = rect.top + rect.height / 2;
                    var dx = mx - bx;
                    var dy = my - by;
                    var dist = Math.hypot(dx, dy);

                    // ---- 大浮动：持续舒缓的悬浮游动 ----
                    var floatY = Math.sin(tSec * 0.9 + s.phase) * 2.5;
                    var floatX = Math.cos(tSec * 1.1 + s.phase) * 2.0;

                    // ---- 磁吸：图标向鼠标靠近 ----
                    var attractRange = 250;
                    var attractRaw = Math.max(0, 1 - dist / attractRange);
                    var attract = attractRaw * attractRaw;
                    var targetAX = dx * attract * 0.10;
                    var targetAY = dy * attract * 0.10;

                    // ---- 间距扩散：鼠标逼近工具栏时两侧图标外推 ----
                    var spreadRange = 300;
                    var spreadRaw = Math.max(0, 1 - distToTB / spreadRange);
                    var spreadFactor = spreadRaw * spreadRaw;
                    var targetSpread = (i - 1) * spreadFactor * 18;

                    // ---- 立体板式 3D 倾斜（强透视）----
                    var tiltRange = 120;
                    var tiltRaw = Math.max(0, 1 - dist / tiltRange);
                    var tilt = tiltRaw * tiltRaw;
                    var targetTX = -(dy / tiltRange) * 15 * tilt;
                    var targetTY =  (dx / tiltRange) * 15 * tilt;

                    // ---- 缩放（鼠标靠近显著放大）----
                    var scaleRange = 100;
                    var scaleRaw = Math.max(0, 1 - dist / scaleRange);
                    var targetScale = 1 + scaleRaw * scaleRaw * 0.15;

                    // ---- 缓动插值（不同速度错开层次）----
                    s.curTX    += (targetTX    - s.curTX)    * 0.18;
                    s.curTY    += (targetTY    - s.curTY)    * 0.18;
                    s.curAX    += (targetAX    - s.curAX)    * 0.14;
                    s.curAY    += (targetAY    - s.curAY)    * 0.14;
                    s.curSpread += (targetSpread - s.curSpread) * 0.10;
                    s.curScale += (targetScale - s.curScale) * 0.22;

                    s.el.style.transform =
                        'perspective(120px) ' +
                        'rotateX(' + s.curTX.toFixed(2) + 'deg) ' +
                        'rotateY(' + s.curTY.toFixed(2) + 'deg) ' +
                        'scale(' + s.curScale.toFixed(3) + ') ' +
                        'translateX(' + (s.curAX + s.curSpread + floatX).toFixed(1) + 'px) ' +
                        'translateY(' + (s.curAY + floatY).toFixed(1) + 'px)';

                    if (Math.abs(s.curTX) > 0.02 || Math.abs(s.curTY) > 0.02 ||
                        Math.abs(s.curAX) > 0.05 || Math.abs(s.curAY) > 0.05 ||
                        Math.abs(s.curSpread) > 0.1 ||
                        Math.abs(s.curScale - 1) > 0.001) {
                        allIdle = false;
                    }
                });

                if (!allIdle || toolbar.classList.contains('visible')) {
                    requestAnimationFrame(loop);
                }
            }

            // 立即启动，维持持续浮动
            requestAnimationFrame(loop);
        })();

        // 加载搜索索引
        function loadSearchIndex(cb) {
            if (searchIndex) { cb(searchIndex); return; }
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/my-notes/assets/search-index.json', true);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    try {
                        searchIndex = JSON.parse(xhr.responseText);
                        cb(searchIndex);
                    } catch(e) { cb(null); }
                } else { cb(null); }
            };
            xhr.onerror = function() { cb(null); };
            xhr.send();
        }

        // 拼音辅助
        function toPinyin(text) {
            try {
                var pp = window.pinyinPro;
                if (!pp) return '';
                var fn = pp.pinyin || (pp.default && pp.default.pinyin) || (pp.default && typeof pp.default === 'function' ? pp.default : null);
                if (!fn) return '';
                var arr = fn(text, { toneType: 'none', type: 'array' });
                return Array.isArray(arr) ? arr.join('') : String(arr).replace(/\s/g, '');
            } catch(e) { return ''; }
        }

        function textMatchable(str) {
            // 返回 [原始文本, 拼音无空格] 用于匹配
            return [str.toLowerCase(), toPinyin(str).toLowerCase()];
        }

        // 搜索
        var searchTimer = null;
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimer);
            var query = searchInput.value.trim();
            if (!query) {
                searchResults.classList.remove('active');
                searchResults.innerHTML = '';
                return;
            }
            if (query.length < 1) return;

            searchTimer = setTimeout(function() {
                loadSearchIndex(function(idx) {
                    if (!idx) {
                        searchResults.innerHTML = '<div class="result-empty">搜索索引加载失败</div>';
                        searchResults.classList.add('active');
                        return;
                    }

                    var titleMatches = [];
                    var contentMatches = [];
                    var q = query.toLowerCase();

                    idx.forEach(function(page) {
                        // 标题匹配
                        var titleTexts = textMatchable(page.title);
                        if (titleTexts[0].indexOf(q) !== -1 || titleTexts[1].indexOf(q) !== -1) {
                            titleMatches.push({ page: page, heading: null, excerpt: null });
                        }
                        // 内容匹配（heading + text 都搜）
                        if (page.sections) {
                            page.sections.forEach(function(sec) {
                                var searchText = sec.heading + ' ' + sec.text;
                                var matchTexts = textMatchable(searchText);
                                var found = matchTexts[0].indexOf(q) !== -1 || matchTexts[1].indexOf(q) !== -1;
                                if (found) {
                                    // 确定匹配位置（用原始文本）
                                    var textIdx = sec.text.toLowerCase().indexOf(q);
                                    if (textIdx === -1) textIdx = sec.heading.toLowerCase().indexOf(q);
                                    if (textIdx === -1) textIdx = 0;
                                    var excerpt = '';
                                    if (textIdx !== -1 && textIdx < sec.text.length) {
                                        var start = Math.max(0, textIdx - 25);
                                        var end = Math.min(sec.text.length, textIdx + query.length + 25);
                                        excerpt = (start > 0 ? '...' : '') + sec.text.substring(start, end).trim() + (end < sec.text.length ? '...' : '');
                                    } else {
                                        excerpt = sec.heading;
                                    }
                                    var dup = false;
                                    for (var i = 0; i < contentMatches.length; i++) {
                                        if (contentMatches[i].page.url === page.url && contentMatches[i].heading === sec.heading) { dup = true; break; }
                                    }
                                    if (!dup) {
                                        contentMatches.push({ page: page, heading: sec.heading, excerpt: excerpt });
                                    }
                                }
                            });
                        }
                    });

                    // 渲染结果
                    var html = '';
                    if (titleMatches.length > 0) {
                        html += '<div class="result-group">标题匹配</div>';
                        titleMatches.forEach(function(m) {
                            html += '<a class="result-item" href="' + m.page.url + '?hl=' + encodeURIComponent(query) + '">'
                                + '<div>' + m.page.title + '</div>'
                                + '<div class="result-heading">' + m.page.category + '</div>'
                                + '</a>';
                        });
                    }
                    if (contentMatches.length > 0) {
                        html += '<div class="result-group">内容匹配</div>';
                        contentMatches.forEach(function(m) {
                            var slug = makeSlug(m.heading);
                            html += '<a class="result-item" href="' + m.page.url + '?hl=' + encodeURIComponent(query) + '#' + slug + '">'
                                + '<div>' + m.page.title + ' · ' + m.heading + '</div>'
                                + '<div class="result-excerpt">' + escapeHTML(m.excerpt) + '</div>'
                                + '</a>';
                        });
                    }
                    if (!html) {
                        html = '<div class="result-empty">未找到匹配内容</div>';
                    }
                    searchResults.innerHTML = html;
                    searchResults.classList.add('active');
                });
            }, 250);
        });

        // 点击搜索结果外部关闭（Spotlight 内点击空白由 overlay 处理）
        // （保留输入框焦点以便继续搜索）

        // 回车键跳转到第一个结果
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                var firstResult = searchResults.querySelector('.result-item');
                if (firstResult) {
                    firstResult.click();
                }
            }
        });

        function escapeHTML(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ========================================
        // 搜索结果高亮（目标页面）
        // ========================================
        (function applyHighlight() {
            var params = new URLSearchParams(window.location.search);
            var hl = params.get('hl');
            if (!hl || hl.length < 2) return;

            function highlightText(root) {
                var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
                var textNodes = [];
                while (walker.nextNode()) {
                    var n = walker.currentNode;
                    // 跳过搜索栏内的文本
                    if (n.parentElement && n.parentElement.closest('#spotlight-overlay')) continue;
                    // 跳过已标记的
                    if (n.parentElement && n.parentElement.tagName === 'MARK') continue;
                    textNodes.push(n);
                }
                for (var i = 0; i < textNodes.length; i++) {
                    var node = textNodes[i];
                    var text = node.textContent;
                    var idx = text.toLowerCase().indexOf(hl.toLowerCase());
                    if (idx === -1) continue;

                    var span = document.createElement('span');
                    var before = text.substring(0, idx);
                    var match = text.substring(idx, idx + hl.length);
                    var after = text.substring(idx + hl.length);

                    var mark = document.createElement('mark');
                    mark.className = 'search-highlight';
                    mark.textContent = match;

                    span.appendChild(document.createTextNode(before));
                    span.appendChild(mark);
                    span.appendChild(document.createTextNode(after));
                    node.parentNode.replaceChild(span, node);
                    break; // 只高亮第一处
                }
            }

            // 尝试先滚动到 URL hash 指定的位置，再高亮
            if (window.location.hash) {
                var target = document.querySelector(window.location.hash);
                if (target) {
                    setTimeout(function() {
                        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        setTimeout(function() { highlightText(document.querySelector('main.content') || document.body); }, 600);
                    }, 400);
                    return;
                }
            }
            setTimeout(function() {
                highlightText(document.querySelector('main.content') || document.body);
                // 找到第一个 mark 并滚动到它
                var firstMark = document.querySelector('mark.search-highlight');
                if (firstMark) {
                    firstMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 400);
        })();
    })();
    </script>
</body>
