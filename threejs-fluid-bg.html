<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Monopo 流体背景</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            -webkit-filter: blur(60px) saturate(1.3);
            filter: blur(60px) saturate(1.3);
            -webkit-transform: scale(2);
            transform: scale(2);
            -webkit-transform-origin: top left;
            transform-origin: top left;
            z-index: 0;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

    <!-- Vertex Shader -->
    <script type="x-shader/x-vertex" id="vertexShader">
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    </script>

    <!-- Fragment Shader -->
    <script type="x-shader/x-fragment" id="fragmentShader">
        precision highp float;
        varying vec2 vUv;
        uniform float u_time;
        uniform vec2  u_resolution;
        uniform vec2  u_mouse;

        // ===== 3D Simplex Noise (Gustavson) =====
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 permute(vec4 x) { return mod289(((x * 34.0) + 1.0) * x); }
        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

        float snoise(vec3 v) {
            const vec2 C = vec2(1.0 / 6.0, 1.0 / 3.0);
            const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
            vec3 i  = floor(v + dot(v, C.yyy));
            vec3 x0 = v - i + dot(i, C.xxx);
            vec3 g  = step(x0.yzx, x0.xyz);
            vec3 l  = 1.0 - g;
            vec3 i1 = min(g.xyz, l.zxy);
            vec3 i2 = max(g.xyz, l.zxy);
            vec3 x1 = x0 - i1 + C.xxx;
            vec3 x2 = x0 - i2 + C.yyy;
            vec3 x3 = x0 - D.yyy;
            i = mod289(i);
            vec4 p = permute(permute(permute(
                     i.z + vec4(0.0, i1.z, i2.z, 1.0))
                   + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                   + i.x + vec4(0.0, i1.x, i2.x, 1.0));
            float n_ = 1.0 / 7.0;
            vec3  ns = n_ * D.wyz - D.xzx;
            vec4  j  = p - 49.0 * floor(p * ns.z * ns.z);
            vec4  x_ = floor(j * ns.z);
            vec4  y_ = floor(j - 7.0 * x_);
            vec4  x  = x_ * ns.x + ns.yyyy;
            vec4  y  = y_ * ns.x + ns.yyyy;
            vec4  h  = 1.0 - abs(x) - abs(y);
            vec4  b0 = vec4(x.xy, y.xy);
            vec4  b1 = vec4(x.zw, y.zw);
            vec4  s0 = floor(b0) * 2.0 + 1.0;
            vec4  s1 = floor(b1) * 2.0 + 1.0;
            vec4  sh = -step(h, vec4(0.0));
            vec4  a0 = b0.xzyw + s0.xzyw * sh.xxyy;
            vec4  a1 = b1.xzyw + s1.xzyw * sh.zzww;
            vec3  p0 = vec3(a0.xy, h.x);
            vec3  p1 = vec3(a0.zw, h.y);
            vec3  p2 = vec3(a1.xy, h.z);
            vec3  p3 = vec3(a1.zw, h.w);
            vec4  norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
            p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
            m = m * m;
            return 42.0 * dot(m * m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
        }

        // ===== FBM — 3 层，振幅衰减 0.5 =====
        float fbm(vec3 x) {
            float v = 0.0;
            float a = 0.5;
            vec3 shift = vec3(100.0);
            for (int i = 0; i < 3; ++i) {
                v += a * snoise(x);
                x = x * 2.0 + shift;
                a *= 0.5;
            }
            return v;
        }

        void main() {
            vec2 uv = vUv;

            // 鼠标影响场
            float influence = smoothstep(0.5, 0.0, length(uv - u_mouse));

            // 流体扭曲采样坐标
            vec2 warp = uv + vec2(
                snoise(vec3(uv * 0.15, 0.0)),
                snoise(vec3(uv * 0.15 + 5.0, 0.0))
            ) * influence * 0.15;

            // 低频噪声 + 极慢流动
            float n = fbm(vec3(warp * 0.12, u_time * 0.03));

            // 分段颜色（严格顺序）
            vec3 col = vec3(0.0);

            // 顶部深蓝
            col += vec3(0.05, 0.1, 0.4)
                 * smoothstep(-0.3, -0.1, n)
                 * (1.0 - smoothstep(0.0, 0.2, n));

            // 中间青蓝过渡
            col += vec3(0.2, 0.6, 0.8)
                 * smoothstep(0.0, 0.2, n)
                 * (1.0 - smoothstep(0.3, 0.5, n));

            // 主体亮橙
            col += vec3(1.0, 0.35, 0.05)
                 * smoothstep(0.3, 0.5, n)
                 * (1.0 - smoothstep(0.7, 0.85, n));

            // 核心银白高光
            col += vec3(1.0, 0.9, 0.8)
                 * smoothstep(0.75, 0.9, n);

            // 边缘衰减遮罩
            float mask = smoothstep(0.0, 0.3, n) * (1.0 - smoothstep(0.8, 1.0, n));
            col *= mask;

            gl_FragColor = vec4(col, 1.0);
        }
    </script>

    <script>
        var scene = new THREE.Scene();

        var fullW = window.innerWidth;
        var fullH = window.innerHeight;
        var renderW = Math.floor(fullW * 0.5);
        var renderH = Math.floor(fullH * 0.5);

        var camera = new THREE.OrthographicCamera(
            -renderW / 2,  renderW / 2,
             renderH / 2, -renderH / 2,
            0.1, 10
        );
        camera.position.z = 1;

        var renderer = new THREE.WebGLRenderer({
            antialias: false,
            alpha: true,
            canvas: document.getElementById('bg-canvas')
        });
        renderer.setSize(renderW, renderH, false);
        renderer.setPixelRatio(1);

        var geometry = new THREE.PlaneGeometry(renderW, renderH);

        var vSrc = document.getElementById('vertexShader').textContent;
        var fSrc = document.getElementById('fragmentShader').textContent;

        var shaderMaterial = new THREE.ShaderMaterial({
            vertexShader:   vSrc,
            fragmentShader: fSrc,
            uniforms: {
                u_time:       { value: 0 },
                u_resolution: { value: new THREE.Vector2(renderW, renderH) },
                u_mouse:      { value: new THREE.Vector2(0.5, 0.5) }
            }
        });

        // 编译诊断
        (function () {
            var gl = renderer.getContext();
            function check(type, src) {
                var s = gl.createShader(type);
                gl.shaderSource(s, src);
                gl.compileShader(s);
                if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
                    console.error('Shader Error:', gl.getShaderInfoLog(s));
                gl.deleteShader(s);
            }
            check(gl.VERTEX_SHADER, vSrc);
            check(gl.FRAGMENT_SHADER, fSrc);
        })();

        var plane = new THREE.Mesh(geometry, shaderMaterial);
        scene.add(plane);

        var mouse = new THREE.Vector2(0.5, 0.5);
        window.addEventListener('mousemove', function (e) {
            mouse.x = e.clientX / fullW;
            mouse.y = 1.0 - e.clientY / fullH;
        });

        var clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            shaderMaterial.uniforms.u_time.value += clock.getDelta();

            var m = shaderMaterial.uniforms.u_mouse.value;
            m.x += (mouse.x - m.x) * 0.05;
            m.y += (mouse.y - m.y) * 0.05;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', function () {
            fullW = window.innerWidth;
            fullH = window.innerHeight;
            renderW = Math.floor(fullW * 0.5);
            renderH = Math.floor(fullH * 0.5);

            camera.left   = -renderW / 2;
            camera.right  =  renderW / 2;
            camera.top    =  renderH / 2;
            camera.bottom = -renderH / 2;
            camera.updateProjectionMatrix();

            renderer.setSize(renderW, renderH, false);
            shaderMaterial.uniforms.u_resolution.value.set(renderW, renderH);

            plane.geometry.dispose();
            plane.geometry = new THREE.PlaneGeometry(renderW, renderH);
        });
    </script>

</body>
</html>
